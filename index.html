<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EstateDesk Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f3efe5;
      --ink: #15110d;
      --card: #fffaf2;
      --line: #d9ccb8;
      --brand: #0f766e;
      --accent: #b45309;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Outfit', sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 10%, #efe6d4 0, transparent 35%),
        radial-gradient(circle at 90% 0%, #e4efe9 0, transparent 30%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 16px;
    }
    .card {
      width: min(760px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(20, 16, 12, 0.08);
    }
    h1 {
      margin: 0;
      font-size: 36px;
      letter-spacing: 0.01em;
    }
    h1 span { color: var(--accent); }
    p {
      margin: 8px 0 24px;
      color: #5d5345;
      font-size: 15px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    a.btn {
      display: block;
      text-decoration: none;
      text-align: center;
      padding: 14px;
      border-radius: 10px;
      font-weight: 600;
      border: 1px solid var(--line);
      color: #fff;
      background: var(--ink);
    }
    a.btn.alt { background: var(--brand); }
    .hint {
      margin-top: 14px;
      font-size: 12px;
      color: #6a5e4d;
    }
    @media (max-width: 720px) {
      .grid { grid-template-columns: 1fr; }
      h1 { font-size: 30px; }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>EstateDesk <span>Portal</span></h1>
    <p>Select your interface to continue.</p>
    <div class="grid">
      <a class="btn" href="customer.html">Open Client Portal</a>
      <a class="btn alt" href="agent.html">Open Agent and Office Portal</a>
    </div>
    <div class="hint">This page is the Netlify entrypoint so deployment works from repository root.</div>
  </main>
</body>
</html>
